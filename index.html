<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Scene</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a2e; }
        canvas { display: block; }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x11111e);

    var camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 5);

    var renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    var ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    var dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    var controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    var cube = new THREE.Mesh(
        new THREE.BoxGeometry(1, 1, 1),
        new THREE.MeshStandardMaterial({ color: 0x00ff88 })
    );
    cube.position.x = -3;
    scene.add(cube);

    var torus = new THREE.Mesh(
        new THREE.TorusGeometry(0.5, 0.15, 16, 100),
        new THREE.MeshStandardMaterial({ color: 0xff4444 })
    );
    torus.position.x = 3;
    scene.add(torus);

    var myModel = null;
    var loader = new THREE.GLTFLoader();

    loader.load('https://raw.githubusercontent.com/kinder22-code/kt3/main/mydonut.glb', function(gltf) {
        myModel = gltf.scene;
        myModel.scale.set(0.5, 0.5, 0.5);
        myModel.position.set(0, 0, 0);
        scene.add(myModel);
    }, undefined, function(err) {
        console.log(err);
    });

    function animate() {
        requestAnimationFrame(animate);
        cube.rotation.x += 0.01;
        cube.rotation.y += 0.01;
        torus.rotation.y += 0.02;
        if (myModel) { myModel.rotation.y += 0.005; }
        controls.update();
        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>

</body>
</html>
