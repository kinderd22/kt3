<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DONUT 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000000; }
        canvas { display: block; }
        .label {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 20px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="label">DONUT 3D — Моя интерактивная сцена</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111113);

    const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );
    camera.position.z = 6;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0x404040);
    scene.add(ambient);

    const directional = new THREE.DirectionalLight(0xffffff, 1);
    directional.position.set(5, 5, 5);
    scene.add(directional);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    const cube = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 1.2, 1.2),
        new THREE.MeshStandardMaterial({ color: 0x222222 })
    );
    cube.position.x = -3;
    scene.add(cube);

    const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.8, 32, 32),
        new THREE.MeshStandardMaterial({ color: 0x7a00ff })
    );
    sphere.position.x = 0;
    scene.add(sphere);

    const torus = new THREE.Mesh(
        new THREE.TorusGeometry(0.9, 0.25, 16, 100),
        new THREE.MeshStandardMaterial({ color: 0x5500aa })
    );
    torus.position.x = 3;
    scene.add(torus);

    const loader = new THREE.GLTFLoader();

    const modelUrl = "https://raw.githubusercontent.com/kinderd22/kt3/main/mydonut.glb";

    let mydonut;

    loader.load(
        modelUrl,
        function (gltf) {
            mydonut = gltf.scene;
            mydonut.scale.set(1.5, 1.5, 1.5);
            mydonut.position.y = -0.5;
            scene.add(mydonut);
            console.log("Модель загружена!");
        },
        undefined,
        function (error) {
            console.error("Ошибка загрузки модели:", error);
        }
    );

    function animate() {
        requestAnimationFrame(animate);

        cube.rotation.x += 0.01;
        cube.rotation.y += 0.01;

        sphere.rotation.y += 0.015;

        torus.rotation.x += 0.01;
        torus.rotation.y += 0.01;

        if (mydonut) {
            mydonut.rotation.y += 0.01;
        }

        controls.update();
        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
